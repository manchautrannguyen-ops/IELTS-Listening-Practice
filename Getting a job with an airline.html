  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\">\n          <path d=\"M11 5L6 9H3v6h3l5 4V5z\"><\u002Fpath>\n          <path d=\"M15.5 8.5a4 4 0 010 7\"><\u002Fpath>\n          <path d=\"M18.5 5.5a8 8 0 010 13\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"audio-meta\">\n        <span class=\"label\">Listening Track<\u002Fspan>\n        <span class=\"name\">Part 1 — Getting a Job with an Airline<\u002Fspan>\n        <span class=\"hint\">Press play once. The recording will play continuously.<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"audio-frame-wrap\">\n        <iframe src=\"https://drive.google.com/file/d/1HcwSaNkVZM8ju4dK8ozYk5jrxbYhcex1/preview\" allow=\"autoplay\" title=\"Getting a Job with an Airline audio\">\n        <\u002Fiframe>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fdiv>\n\n  <!-- ============== Q 1-10: Notes completion ============== -->\n  <section class=\"qblock\" data-group=\"1-10\">\n    <div class=\"qhead\">\n      <span class=\"qrange\">Questions 1 — 10<\u002Fspan>\n      <span class=\"qcount\">10 marks<\u002Fspan>\n    <\u002Fdiv>\n    <p class=\"instruction\">Complete the notes below.<\u002Fp>\n    <p class=\"instruction\">Write <strong>ONE WORD AND/OR A NUMBER<\u002Fstrong> for each answer.<\u002Fp>\n\n    <div class=\"notes-card\">\n      <div class=\"notes-banner\">Getting a job with an airline<\u002Fdiv>\n      <div class=\"notes-body\">\n        <div class=\"kv-row\"><span>Example: Job: cabin crew attendant<\u002Fspan><\u002Fdiv>\n\n        <div class=\"sub-head\">Duties include<\u002Fdiv>\n        <ul class=\"notes-list\">\n          <li>giving the safety demonstration.<\u002Fli>\n          <li>some responsibility for\n            <span class=\"gap\"><span class=\"qnum\">1<\u002Fspan><input class=\"ti\" type=\"text\" data-q=\"1\" data-correct=\"money\" autocomplete=\"off\" spellcheck=\"false\" aria-label=\"Answer 1\"><span class=\"verdict\"><\u002Fspan><\u002Fspan>\n            from sales during the flight.\n          <\u002Fli>\n          <li>serving food.<\u002Fli>\n        <\u002Ful>\n\n        <div class=\"sub-head\">Requirements<\u002Fdiv>\n        <ul class=\"notes-list\">\n          <li>must be over age 19 and at least\n            <span class=\"gap\"><span class=\"qnum\">2<\u002Fspan><input class=\"ti narrow\" type=\"text\" data-q=\"2\" data-correct=\"168\" autocomplete=\"off\" spellcheck=\"false\" aria-label=\"Answer 2\"><span class=\"verdict\"><\u002Fspan><\u002Fspan>\n            cm tall.\n          <\u002Fli>\n          <li>basic academic requirements: English and\n            <span class=\"gap\"><span class=\"qnum\">3<\u002Fspan><input class=\"ti\" type=\"text\" data-q=\"3\" data-correct=\"math|maths\" autocomplete=\"off\" spellcheck=\"false\" aria-label=\"Answer 3\"><span class=\"verdict\"><\u002Fspan><\u002Fspan>\n          <\u002Fli>\n          <li>at least one other\n            <span class=\"gap\"><span class=\"qnum\">4<\u002Fspan><input class=\"ti\" type=\"text\" data-q=\"4\" data-correct=\"language\" autocomplete=\"off\" spellcheck=\"false\" aria-label=\"Answer 4\"><span class=\"verdict\"><\u002Fspan><\u002Fspan>\n            is desirable.\n          <\u002Fli>\n          <li>must be able to\n            <span class=\"gap\"><span class=\"qnum\">5<\u002Fspan><input class=\"ti\" type=\"text\" data-q=\"5\" data-correct=\"swim\" autocomplete=\"off\" spellcheck=\"false\" aria-label=\"Answer 5\"><span class=\"verdict\"><\u002Fspan><\u002Fspan>\n          <\u002Fli>\n        <\u002Ful>\n\n        <div class=\"sub-head\">Training will include<\u002Fdiv>\n        <ul class=\"notes-list\">\n          <li>what to do in case of\n            <span class=\"gap\"><span class=\"qnum\">6<\u002Fspan><input class=\"ti\" type=\"text\" data-q=\"6\" data-correct=\"illness\" autocomplete=\"off\" spellcheck=\"false\" aria-label=\"Answer 6\"><span class=\"verdict\"><\u002Fspan><\u002Fspan>\n            during a flight.\n          <\u002Fli>\n          <li>awareness of different\n            <span class=\"gap\"><span class=\"qnum\">7<\u002Fspan><input class=\"ti\" type=\"text\" data-q=\"7\" data-correct=\"cultures\" autocomplete=\"off\" spellcheck=\"false\" aria-label=\"Answer 7\"><span class=\"verdict\"><\u002Fspan><\u002Fspan>\n          <\u002Fli>\n        <\u002Ful>\n\n        <div class=\"sub-head\">Application<\u002Fdiv>\n        <ul class=\"notes-list\">\n          <li>the airline is called\n            <span class=\"gap\"><span class=\"qnum\">8<\u002Fspan><input class=\"ti\" type=\"text\" data-q=\"8\" data-correct=\"Eurontas\" autocomplete=\"off\" spellcheck=\"false\" aria-label=\"Answer 8\"><span class=\"verdict\"><\u002Fspan><\u002Fspan>\n          <\u002Fli>\n          <li>can download application form from website.<\u002Fli>\n          <li>mention experience of:\n            <ul class=\"sub\">\n              <li>dealing with questions from supermarket customers.<\u002Fli>\n              <li>working in a\n                <span class=\"gap\"><span class=\"qnum\">9<\u002Fspan><input class=\"ti\" type=\"text\" data-q=\"9\" data-correct=\"team\" autocomplete=\"off\" spellcheck=\"false\" aria-label=\"Answer 9\"><span class=\"verdict\"><\u002Fspan><\u002Fspan>\n                (voluntary work).\n              <\u002Fli>\n            <\u002Ful>\n          <\u002Fli>\n        <\u002Ful>\n\n        <div class=\"sub-head\">Other information<\u002Fdiv>\n        <ul class=\"notes-list\">\n          <li>you don't have to buy a\n            <span class=\"gap\"><span class=\"qnum\">10<\u002Fspan><input class=\"ti\" type=\"text\" data-q=\"10\" data-correct=\"uniform\" autocomplete=\"off\" spellcheck=\"false\" aria-label=\"Answer 10\"><span class=\"verdict\"><\u002Fspan><\u002Fspan>\n          <\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n<\u002Fmain>\n\n<div class=\"hl-hint\" id=\"hlHint\">\n  <span class=\"swatch\"><\u002Fspan>\n  <span><strong>Highlighter on.<\u002Fstrong> Select any text in a question to highlight it. Click a highlight to remove.<\u002Fspan>\n<\u002Fdiv>\n\n<div class=\"modal-back show\" id=\"gateBack\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"gateTitle\">\n  <div class=\"modal gate-modal\">\n    <span class=\"eyebrow\">Before you start<\u002Fspan>\n    <h2 id=\"gateTitle\">Enter your details<\u002Fh2>\n    <p class=\"gate-sub\">Please enter your name and class to begin the test.<\u002Fp>\n    <div class=\"gate-field\">\n      <label for=\"studentNameInput\">Full name<\u002Flabel>\n      <input type=\"text\" id=\"studentNameInput\" class=\"gate-input\" autocomplete=\"off\" spellcheck=\"false\" placeholder=\"e.g. Nguyen Van A\">\n    <\u002Fdiv>\n    <div class=\"gate-field\">\n      <label for=\"studentClassInput\">Class<\u002Flabel>\n      <input type=\"text\" id=\"studentClassInput\" class=\"gate-input\" autocomplete=\"off\" spellcheck=\"false\" placeholder=\"e.g. 10A1\">\n    <\u002Fdiv>\n    <div class=\"gate-error\" id=\"gateError\">Please fill in both your name and class to continue.<\u002Fdiv>\n    <div class=\"actions\">\n      <button class=\"primary\" id=\"startTestBtn\">Start test<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"modal-back\" id=\"modalBack\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"resultTitle\">\n  <div class=\"modal\">\n    <span class=\"eyebrow\">Result<\u002Fspan>\n    <h2 id=\"resultTitle\">Test submitted<\u002Fh2>\n    <div class=\"score\"><span id=\"scoreNum\">0<\u002Fspan><small> / 10<\u002Fsmall><\u002Fdiv>\n    <div class=\"band\" id=\"scoreBand\">—<\u002Fdiv>\n    <div class=\"breakdown\" id=\"breakdown\"><\u002Fdiv>\n    <div class=\"actions\">\n      <button class=\"ghost\" id=\"reviewBtn\">Review my paper<\u002Fbutton>\n      <button class=\"primary\" id=\"retryBtn\">Try again<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\nconst DURATION = 10 * 60;\nlet remaining = DURATION;\nlet timerHandle = null;\nconst timerEl = document.getElementById('timer');\nconst timerNumEl = document.getElementById('timerNum');\n\nfunction fmt(s) {\n  const m = Math.floor(s/60), r = s%60;\n  return String(m).padStart(2,'0') + ':' + String(r).padStart(2,'0');\n}\nfunction tick() {\n  remaining -= 1;\n  if (remaining <= 0) {\n    remaining = 0;\n    timerNumEl.textContent = '00:00';\n    clearInterval(timerHandle); timerHandle = null;\n    submitTest(true);\n    return;\n  }\n  timerNumEl.textContent = fmt(remaining);\n  timerEl.classList.toggle('warn', remaining <= 120 && remaining > 30);\n  timerEl.classList.toggle('danger', remaining <= 30);\n}\nfunction startTimer() { if (!timerHandle) timerHandle = setInterval(tick, 1000); }\nfunction stopTimer() { clearInterval(timerHandle); timerHandle = null; }\nlet started = false;\nfunction maybeStart() { if (started) return; started = true; startTimer(); }\n\nconst HL_ZONES = '.qblock';\nconst hlToggle = document.getElementById('hlToggle');\nconst hlHint = document.getElementById('hlHint');\nlet hlMode = false;\nfunction setHlMode(on) {\n  hlMode = on;\n  document.body.classList.toggle('hl-mode', on);\n  hlToggle.classList.toggle('active', on);\n  hlToggle.setAttribute('aria-pressed', on ? 'true' : 'false');\n  hlHint.classList.toggle('show', on);\n}\nhlToggle.addEventListener('click', () => setHlMode(!hlMode));\ndocument.addEventListener('keydown', e => {\n  if (e.key && e.key.toLowerCase() === 'h' && !e.target.matches('input, select, textarea')) setHlMode(!hlMode);\n});\ndocument.addEventListener('mouseup', () => {\n  if (!hlMode) return;\n  const sel = window.getSelection();\n  if (!sel || sel.isCollapsed) return;\n  const range = sel.getRangeAt(0);\n  if (range.collapsed) return;\n  const container = range.commonAncestorContainer;\n  const host = (container.nodeType === 1 ? container : container.parentElement).closest(HL_ZONES);\n  if (!host) return;\n  if (range.startContainer.parentElement && range.startContainer.parentElement.closest('input,select,button,img,iframe')) return;\n  try { wrapRangeWithHighlight(range); sel.removeAllRanges(); } catch (_) {}\n});\ndocument.addEventListener('click', e => {\n  const hl = e.target.closest('.hl');\n  if (!hl) return;\n  const parent = hl.parentNode;\n  while (hl.firstChild) parent.insertBefore(hl.firstChild, hl);\n  parent.removeChild(hl);\n  parent.normalize();\n});\nfunction wrapRangeWithHighlight(range) {\n  const root = range.commonAncestorContainer;\n  const rootEl = root.nodeType === 1 ? root : root.parentElement;\n  const walker = document.createTreeWalker(rootEl, NodeFilter.SHOW_TEXT, {\n    acceptNode(node) {\n      if (!range.intersectsNode(node)) return NodeFilter.FILTER_REJECT;\n      if (node.parentElement.closest('input,select,button,iframe,.qnum,.verdict')) return NodeFilter.FILTER_REJECT;\n      return NodeFilter.FILTER_ACCEPT;\n    }\n  });\n  const nodes = []; let n;\n  while ((n = walker.nextNode())) nodes.push(n);\n  nodes.forEach(node => {\n    if (!node.nodeValue || !node.nodeValue.trim()) return;\n    let start = 0, end = node.nodeValue.length;\n    if (node === range.startContainer) start = range.startOffset;\n    if (node === range.endContainer) end = range.endOffset;\n    if (end <= start) return;\n    const before = node.nodeValue.slice(0, start);\n    const middle = node.nodeValue.slice(start, end);\n    const after = node.nodeValue.slice(end);\n    if (!middle.trim()) return;\n    const parent = node.parentNode;\n    const frag = document.createDocumentFragment();\n    if (before) frag.appendChild(document.createTextNode(before));\n    const span = document.createElement('span');\n    span.className = 'hl'; span.textContent = middle;\n    frag.appendChild(span);\n    if (after) frag.appendChild(document.createTextNode(after));\n    parent.replaceChild(frag, node);\n  });\n}\n\n/* === Name / class gate (required before the test can be taken) === */\nconst gateBack = document.getElementById('gateBack');\nconst studentNameInput = document.getElementById('studentNameInput');\nconst studentClassInput = document.getElementById('studentClassInput');\nconst gateError = document.getElementById('gateError');\nconst startTestBtn = document.getElementById('startTestBtn');\nlet studentName = '';\nlet studentClass = '';\n\nfunction tryStartTest() {\n  const nameVal = studentNameInput.value.trim();\n  const classVal = studentClassInput.value.trim();\n  const nameOk = nameVal.length > 0;\n  const classOk = classVal.length > 0;\n  studentNameInput.classList.toggle('invalid', !nameOk);\n  studentClassInput.classList.toggle('invalid', !classOk);\n  if (!nameOk || !classOk) {\n    gateError.classList.add('show');\n    (nameOk ? studentClassInput : studentNameInput).focus();\n    return;\n  }\n  studentName = nameVal;\n  studentClass = classVal;\n  gateBack.classList.remove('show');\n  maybeStart();\n}\nstartTestBtn.addEventListener('click', tryStartTest);\n[studentNameInput, studentClassInput].forEach(inp => {\n  inp.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); tryStartTest(); } });\n  inp.addEventListener('input', () => {\n    inp.classList.remove('invalid');\n    if (studentNameInput.value.trim() && studentClassInput.value.trim()) gateError.classList.remove('show');\n  });\n});\nif (studentNameInput) studentNameInput.focus();\n\n/* === Google Form submission (test results) === */\nconst GOOGLE_FORM_ID = '1FAIpQLSfSLHvMW4ai9K8lnSQalsbkWI8GL-lBDjKLUBtAy-7wRyYT-A';\nconst GOOGLE_FORM_ENTRIES = {\n  name: 'entry.2081569857',\n  className: 'entry.1457332163',\n  answers: 'entry.1305532431',\n  score: 'entry.745648417'\n};\n\nfunction buildAnswersSummary(perQ) {\n  const lines = [];\n  for (let q = 1; q <= 10; q++) {\n    const inp = document.querySelector('.ti[data-q=\"' + q + '\"]');\n    const val = inp ? inp.value.trim() : '';\n    lines.push('Q' + q + ': ' + (val || '(blank)'));\n  }\n  return lines.join(' | ');\n}\n\nfunction submitToGoogleForm(data) {\n  try {\n    let iframe = document.getElementById('gformTarget');\n    if (!iframe) {\n      iframe = document.createElement('iframe');\n      iframe.name = 'gformTarget';\n      iframe.id = 'gformTarget';\n      iframe.style.display = 'none';\n      document.body.appendChild(iframe);\n    }\n    const form = document.createElement('form');\n    form.action = 'https://docs.google.com/forms/d/e/' + GOOGLE_FORM_ID + '/formResponse';\n    form.method = 'POST';\n    form.target = 'gformTarget';\n    form.style.display = 'none';\n    Object.keys(data).forEach(key => {\n      const input = document.createElement('input');\n      input.type = 'hidden';\n      input.name = key;\n      input.value = data[key];\n      form.appendChild(input);\n    });\n    document.body.appendChild(form);\n    form.submit();\n    setTimeout(() => { form.remove(); }, 2000);\n  } catch (err) {\n    console.error('[gform] submit failed:', err);\n  }\n}\n\nconst submitBtn = document.getElementById('submitBtn');\nconst modalBack = document.getElementById('modalBack');\nconst scoreNum = document.getElementById('scoreNum');\nconst scoreBand = document.getElementById('scoreBand');\nconst breakdownEl = document.getElementById('breakdown');\nconst reviewBtn = document.getElementById('reviewBtn');\nconst retryBtn = document.getElementById('retryBtn');\n\nsubmitBtn.addEventListener('click', () => submitTest(false));\n\nfunction normalize(s) {\n  return (s || '').trim().toLowerCase().replace(/[.,;:'\"!?]/g, '').replace(/\\s+/g, ' ');\n}\nfunction matchesText(value, correctAttr) {\n  const got = normalize(value);\n  if (!got) return false;\n  return correctAttr.split('|').map(normalize).some(c => c.length && c === got);\n}\n\nfunction submitTest(forced) {\n  if (document.body.classList.contains('submitted')) return;\n  if (gateBack.classList.contains('show')) return;\n  if (!forced) {\n    const unanswered = countUnanswered();\n    if (unanswered > 0) {\n      const msg = unanswered === 1\n        ? \"There is 1 question unanswered. Submit anyway?\"\n        : \"There are \" + unanswered + \" questions unanswered. Submit anyway?\";\n      if (!confirm(msg)) return;\n    }\n  }\n  stopTimer();\n  document.body.classList.add('submitted');\n\n  const perQ = {};\n  let total = 0;\n\n  document.querySelectorAll('.ti').forEach(inp => {\n    const q = parseInt(inp.dataset.q, 10);\n    const ok = matchesText(inp.value, inp.dataset.correct || '');\n    perQ[q] = ok;\n    if (ok) total += 1;\n    inp.classList.add(ok ? 'ok' : 'no');\n    const v = inp.parentElement.querySelector('.verdict');\n    if (v) { v.classList.add(ok ? 'ok' : 'no'); v.textContent = ok ? '✓' : '✗'; }\n  });\n\n  scoreNum.textContent = total;\n  scoreBand.textContent = bandFor(total);\n\n  breakdownEl.innerHTML = '';\n  for (let q = 1; q <= 10; q++) {\n    const cell = document.createElement('div');\n    cell.className = 'cell ' + (perQ[q] ? 'ok' : 'no');\n    cell.innerHTML = '<span class=\"qn\">Q' + q + '<\u002Fspan><span class=\"v\">' + (perQ[q] ? '✓' : '✗') + '<\u002Fspan>';\n    breakdownEl.appendChild(cell);\n  }\n  modalBack.classList.add('show');\n  submitBtn.disabled = true;\n  submitBtn.textContent = 'Submitted';\n\n  submitToGoogleForm({\n    [GOOGLE_FORM_ENTRIES.name]: studentName,\n    [GOOGLE_FORM_ENTRIES.className]: studentClass,\n    [GOOGLE_FORM_ENTRIES.answers]: buildAnswersSummary(perQ),\n    [GOOGLE_FORM_ENTRIES.score]: total + ' / 10'\n  });\n}\n\nfunction countUnanswered() {\n  let n = 0;\n  document.querySelectorAll('.ti').forEach(inp => { if (!inp.value.trim()) n++; });\n  return n;\n}\n\nfunction bandFor(score) {\n  if (score === 10) return 'Outstanding — full marks on Part 1.';\n  if (score >= 8) return 'Strong performance — review the missed items.';\n  if (score >= 6) return 'Solid pass — keep practising tricky spellings.';\n  if (score >= 4) return 'Getting there — focus on the details.';\n  return 'Keep going — listen again and try once more.';\n}\n\nreviewBtn.addEventListener('click', () => modalBack.classList.remove('show'));\nretryBtn.addEventListener('click', () => location.reload());\nmodalBack.addEventListener('click', e => { if (e.target === modalBack) modalBack.classList.remove('show'); });\ndocument.addEventListener('keydown', e => {\n  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) submitTest(false);\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
